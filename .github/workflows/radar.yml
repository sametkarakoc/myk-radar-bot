name: MYK Radar Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Paketleri yükle
        run: pip install -r requirements.txt

      - name: Botu çalıştır
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Görülen haberleri kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen.json
          git commit -m "Update seen news" || echo "Yeni haber kaydı yok"
          git push
